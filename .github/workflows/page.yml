name: pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '*/42 * * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node src/mirror.js
        env:
          MIRROR_DOMAIN: ${{ vars.MIRROR_DOMAIN }}
      - run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add public/index.html
          git diff --cached --quiet || git commit -m "crawl"
          git push

  deploy:
    needs: crawl
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public/
      - uses: actions/deploy-pages@v4
        id: deployment
