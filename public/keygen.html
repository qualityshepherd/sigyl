<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>sigyl / keygen</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="wrap">
    <header>
      <a href="/">&larr; sigyl.org</a>
      <h1><span>sigyl /</span> keygen</h1>
      <nav>
        <a href="/about">about</a>
        <a href="/keygen">keygen</a>
      </nav>
    </header>

    <div class="warning">
      <strong>Your key never leaves this browser.</strong><br>
      Pick a sentence only you would think of. The weirder and longer, the better. Your favorite obscure movie quote is perfect. "Password" is not.
    </div>

    <div class="section">
      <label class="label" for="passphrase">your passphrase</label>
      <input id="passphrase" type="text" placeholder="yeah well that's just like your opinion man" autocomplete="off" spellcheck="false">
      <label class="label" for="mirror-input">your mirror url</label>
      <input id="mirror-input" type="url" placeholder="https://sigyl.org" value="https://sigyl.org">
      <button id="generate" aria-label="Generate keypair from passphrase">generate key</button>
    </div>

    <div class="output" id="output" aria-live="polite">

      <div class="section">
        <div class="label">public key</div>
        <div class="pubkey" id="pubkey"></div>
      </div>

      <div class="section">
        <div class="label">add to your identity.json</div>
        <div class="identity-json" id="identity-json"></div>
        <button class="copy-btn" id="copy" aria-label="Copy identity.json entry to clipboard">copy</button>
        <div class="status" id="copy-status"></div>
      </div>

    </div>
  </div>

  <script>
    function toBase64 (buf) {
      return btoa(String.fromCharCode(...new Uint8Array(buf)))
    }

    async function passphraseToKeyPair (passphrase) {
      const enc = new TextEncoder()

      // Import passphrase as key material for PBKDF2
      const keyMaterial = await crypto.subtle.importKey(
        'raw',
        enc.encode(passphrase),
        'PBKDF2',
        false,
        ['deriveBits']
      )

      // Derive 32 bytes — deterministic, slow to brute force
      const bits = await crypto.subtle.deriveBits(
        {
          name: 'PBKDF2',
          hash: 'SHA-256',
          salt: enc.encode('sigyl'),
          iterations: 100000
        },
        keyMaterial,
        256
      )

      // Use derived bytes as HMAC key to sign a fixed message
      // giving us a deterministic public key from the passphrase
      const hmacKey = await crypto.subtle.importKey(
        'raw',
        bits,
        { name: 'HMAC', hash: 'SHA-256' },
        false,
        ['sign']
      )

      const signature = await crypto.subtle.sign(
        'HMAC',
        hmacKey,
        enc.encode('sigyl-public-key-v1')
      )

      return toBase64(signature)
    }

    async function generate () {
      const passphrase = document.getElementById('passphrase').value.trim()
      if (!passphrase) {
        document.getElementById('passphrase').focus()
        return
      }

      const btn = document.getElementById('generate')
      btn.disabled = true
      btn.textContent = 'generating...'

      const mirror = document.getElementById('mirror-input').value || 'https://sigyl.org'
      const publicKey = await passphraseToKeyPair(passphrase)

      document.getElementById('pubkey').textContent = publicKey

      const entry = JSON.stringify({ public_key: publicKey, mirror }, null, 2)
      document.getElementById('identity-json').textContent = entry

      document.getElementById('copy').onclick = () => {
        navigator.clipboard.writeText(entry).then(() => {
          document.getElementById('copy-status').textContent = 'copied'
          setTimeout(() => { document.getElementById('copy-status').textContent = '' }, 2000)
        })
      }

      document.getElementById('output').classList.add('visible')
      btn.textContent = 'regenerate'
      btn.disabled = false
    }

    document.getElementById('generate').addEventListener('click', generate)

    document.getElementById('passphrase').addEventListener('keydown', e => {
      if (e.key === 'Enter') generate()
    })
  </script>
</body>
</html>
